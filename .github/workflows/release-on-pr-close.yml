name: Release On PR Close

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install makeself
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself

      - name: Build package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="$(sed -n "s/^POSTINSTALL_VERSION='\([^']*\)'$/\1/p" postinstall.sh | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "Nao foi possivel extrair POSTINSTALL_VERSION de postinstall.sh" >&2
            exit 1
          fi

          tag="v${version}"
          artifact="linux-postinstall-${version}.run"

          mkdir -p package
          cp -a postinstall.sh README.md ext-bash .hello-message.txt package/

          makeself \
            --nox11 \
            package \
            "${artifact}" \
            "Linux PostInstall ${tag}" \
            ./postinstall.sh

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: Linux PostInstall ${{ steps.package.outputs.tag }}
          files: ${{ steps.package.outputs.artifact }}